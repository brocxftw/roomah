services:
  - type: web
    name: roomah-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FRONTEND_ORIGIN_REGEX
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: DEFAULT_TEAM_ID
        value: 00000000-0000-4000-8000-000000000001
